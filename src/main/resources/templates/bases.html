<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Bases | Daniela Beauty</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="category-page">
    <div th:replace="~{fragments/shared :: navbar}"></div>

    <main class="category-main">
        <section class="category-hero category-hero--bases">
            <div class="category-hero-content">
                <p class="subtitle" th:text="${heroEyebrow}">COLECCIÓN EXCLUSIVA</p>
                <h2 th:text="${heroTitle}">Bases</h2>
                <p th:text="${heroDescription}">Cobertura uniforme, acabado skin-like y sensación ligera para un look pulido y real.</p>
            </div>
        </section>

        <div th:replace="~{fragments/category-products :: grid(${sectionTitle}, ${sectionSubtitle}, ${products})}"></div>
    </main>

    <div th:replace="~{fragments/shared :: cart}"></div>
    <div th:replace="~{fragments/shared :: footer}"></div>

    <script src="/js/script.js"></script>
</body>

</html>
